<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta id="meta-theme" name="theme-color" content="#1B1917">
<title>ChopKar</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<script src="/i18n.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{--brand:#D85A30;--card-text:#FFFFFF;--bg:#1B1917;--s1:#221F1D;--s2:#2A2624;--s3:#332E2B;--b1:#2A2624;--b2:#36302C;--b3:#463E38;--t1:#F1ECE6;--t2:#A39C94;--t3:#6E665E;--ck-accent:#D85A30;--ck-muted:#888780;--ok:#1D9E75;--warn:#EF9F27;--err:#E24B4A;--r:14px;--rs:9px;}
html,body{min-height:100%;background:var(--bg);color:var(--t1);font-family:system-ui,-apple-system,'DM Sans',sans-serif;font-size:15px}
button{font-family:inherit;cursor:pointer}
.app{min-height:100vh;min-height:100dvh;max-width:460px;margin:0 auto;display:flex;flex-direction:column;padding:0 18px 32px}
.view{display:none;flex-direction:column;flex:1}
.view.on{display:flex}
.ck-top{display:flex;justify-content:flex-end;padding:14px 0 0}
.ck-mark{font-family:'Bebas Neue',sans-serif;font-size:14px;letter-spacing:2px;color:var(--t2);opacity:.9}
.ck-mark b{color:var(--ck-accent);font-weight:400}
.hero{text-align:center;padding:18px 0 22px}
.hero-logo{font-family:'Bebas Neue',sans-serif;font-size:40px;letter-spacing:3px;color:var(--brand);line-height:1}
.hero-logo img{max-height:52px;max-width:78%;object-fit:contain}
.hero-sub{font-size:12px;color:var(--t3);letter-spacing:2px;text-transform:uppercase;margin-top:6px}
.sec-ttl{font-size:12px;letter-spacing:1.5px;text-transform:uppercase;color:var(--t3);margin:8px 2px 12px;display:flex;align-items:center;gap:8px}
.sec-ttl i{color:var(--brand)}
.bottle{background:var(--s1);border:1px solid var(--b2);border-radius:var(--r);padding:16px;margin-bottom:12px}
.b-top{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;margin-bottom:12px}
.b-brand{font-size:18px;font-weight:500}
.b-photo{width:44px;height:44px;border-radius:10px;object-fit:cover;background:var(--s3);flex-shrink:0}
.b-exp{font-size:11px;font-family:'DM Mono',monospace;color:var(--t3);margin-top:3px}
.b-exp.warn{color:var(--err)}
.prog{background:var(--s3);border-radius:20px;height:9px;overflow:hidden;margin:4px 0 6px}
.prog-fill{height:9px;border-radius:20px;transition:width .5s ease}
.b-amt{display:flex;justify-content:space-between;font-size:12px;font-family:'DM Mono',monospace;color:var(--t2)}
.b-amt b{color:var(--t1);font-weight:500}
.b-foot{display:flex;justify-content:flex-end;margin-top:8px}
.tx-btn{background:transparent;border:1px solid var(--b3);border-radius:20px;color:var(--t2);font-size:11px;padding:4px 12px}
.tx-list{margin-top:10px;border-top:1px solid var(--b1);padding-top:8px;display:none}
.tx-list.on{display:block}
.tx-item{display:flex;justify-content:space-between;font-size:11px;font-family:'DM Mono',monospace;color:var(--t3);padding:4px 0}
.voucher{background:var(--s1);border:1px solid var(--b2);border-radius:var(--r);padding:14px;margin-bottom:10px;display:flex;align-items:center;gap:12px}
.v-ico{width:40px;height:40px;border-radius:10px;background:rgba(216,90,48,0.12);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.v-ico i{color:var(--brand);font-size:18px}
.v-body{flex:1;min-width:0}
.v-label{font-size:14px;font-weight:500}
.v-meta{font-size:11px;color:var(--t3);font-family:'DM Mono',monospace;margin-top:2px}
.v-rem{text-align:right}
.v-rem-val{font-family:'Bebas Neue',sans-serif;font-size:24px;color:var(--brand);line-height:1}
.v-rem-lbl{font-size:10px;color:var(--t3)}
.empty{text-align:center;color:var(--t3);padding:32px 16px;font-size:13px;line-height:1.7}
.empty i{font-size:40px;display:block;margin-bottom:10px;color:var(--b3)}
.btn{display:flex;align-items:center;justify-content:center;gap:7px;width:100%;padding:14px;border-radius:var(--rs);border:none;background:var(--brand);color:var(--card-text);font-size:15px;font-weight:500;transition:filter .15s}
.btn:active{filter:brightness(.92)}
.ck-footer{margin-top:auto;padding-top:24px;text-align:center;font-size:12px;color:var(--ck-muted);letter-spacing:.5px}
.ck-footer b{color:var(--ck-accent);font-weight:500}
.loader{display:flex;align-items:center;justify-content:center;padding:60px;color:var(--t3)}
.loader i{animation:sp 1s linear infinite;font-size:28px}
@keyframes sp{to{transform:rotate(360deg)}}
.toast{position:fixed;top:18px;right:18px;background:var(--s2);border:1px solid var(--b3);border-radius:10px;padding:10px 16px;font-size:13px;color:var(--t1);z-index:200;opacity:0;transform:translateY(-10px);transition:all .25s;pointer-events:none;max-width:80%}
.toast.on{opacity:1;transform:translateY(0)}
.toast.ok{border-color:var(--ok);color:var(--ok)}
.toast.err{border-color:var(--err);color:var(--err)}
/* OTP Auth */
.auth-wrap{display:flex;flex-direction:column;align-items:center;justify-content:center;flex:1;text-align:center;gap:6px}
.auth-wrap .ico{font-size:42px;color:var(--brand);margin-bottom:4px}
.auth-wrap h2{font-size:18px;font-weight:500}
.auth-wrap .sub{font-size:13px;color:var(--t2);max-width:260px;line-height:1.6;margin-bottom:12px}
.auth-input-row{display:flex;gap:6px;width:100%;max-width:320px;margin:0 auto}
.auth-cc{width:80px;height:48px;border-radius:var(--rs);border:1.5px solid var(--b2);background:var(--s1);color:var(--t1);font-size:14px;padding:0 6px}
.auth-ph{flex:1;height:48px;border-radius:var(--rs);border:1.5px solid var(--b2);background:var(--s1);color:var(--t1);font-size:15px;padding:0 14px;outline:none}
.auth-ph:focus{border-color:var(--brand)}
.otp-row{display:flex;gap:8px;justify-content:center;margin:20px 0}
.otp-box{width:48px;height:56px;border-radius:8px;border:1.5px solid #3A3A3A;background:var(--s1);color:var(--t1);font-size:24px;font-family:'DM Mono',monospace;text-align:center;outline:none;transition:border .2s;-webkit-appearance:none;caret-color:var(--brand)}
.otp-box:focus{border-color:var(--brand);box-shadow:0 0 0 3px rgba(216,90,48,0.15)}
.otp-phone-lbl{font-family:'DM Mono',monospace;color:var(--brand);font-size:15px;letter-spacing:1px}
.err-text{color:#E24B4A;font-size:12px;min-height:16px;text-align:center;margin-top:4px}
.resend-row{text-align:center;margin-top:10px}
.resend-btn{background:transparent;border:none;color:var(--brand);font-size:13px;cursor:pointer;padding:4px 8px;transition:opacity .2s}
.resend-btn:disabled{color:var(--t3);cursor:not-allowed}
.nn-input{width:100%;max-width:280px;height:48px;border-radius:var(--rs);border:1.5px solid var(--b2);background:var(--s1);color:var(--t1);font-size:15px;padding:0 14px;outline:none;text-align:center}
.nn-input:focus{border-color:var(--brand)}
</style>
</head>
<body>
<div class="app">

<div id="v-loading" class="view on"><div class="loader"><i class="ti ti-loader-2" aria-hidden="true"></i></div></div>

<div id="v-error" class="view" style="align-items:center;justify-content:center;text-align:center;flex:1">
  <i class="ti ti-alert-circle" style="font-size:46px;color:var(--t3);margin-bottom:14px"></i>
  <div style="font-size:16px;font-weight:500">商家未找到</div>
  <div style="font-size:13px;color:var(--t2);margin-top:6px">请检查链接</div>
</div>

<!-- OTP Auth: Step 1 - Phone -->
<div id="v-auth" class="view">
  <div class="auth-wrap">
    <i class="ti ti-bottle ico" aria-hidden="true"></i>
    <h2>查看我的存酒</h2>
    <div class="sub">输入手机号验证身份，即可查看存酒和储值券</div>
    <div class="auth-input-row">
      <select class="auth-cc" id="b-cc">
        <option value="+60" selected>🇲🇾 +60</option>
        <option value="+65">🇸🇬 +65</option>
        <option value="+62">🇮🇩 +62</option>
        <option value="+66">🇹🇭 +66</option>
        <option value="+63">🇵🇭 +63</option>
        <option value="+44">🇬🇧 +44</option>
        <option value="+1">🇺🇸 +1</option>
        <option value="other">Other</option>
      </select>
      <input class="auth-ph" id="b-ph" type="tel" placeholder="11-2345 6789" inputmode="tel" autocomplete="tel">
    </div>
    <div id="b-send-err" class="err-text"></div>
    <button class="btn" id="b-send-btn" style="max-width:320px;margin-top:6px" onclick="bSendOtp()">
      <i class="ti ti-message" aria-hidden="true"></i> 获取验证码
    </button>
    <p style="font-size:11px;color:var(--t3);margin-top:2px">新老会员均可直接登录</p>
  </div>
</div>

<!-- OTP Auth: Step 2 - Verify -->
<div id="v-otp" class="view">
  <div class="auth-wrap">
    <i class="ti ti-shield-lock ico" aria-hidden="true"></i>
    <h2>输入验证码</h2>
    <div class="otp-phone-lbl" id="b-otp-phone"></div>
    <div class="otp-row">
      <input class="otp-box" id="b-otp-0" type="tel" maxlength="1" inputmode="numeric" autocomplete="one-time-code">
      <input class="otp-box" id="b-otp-1" type="tel" maxlength="1" inputmode="numeric">
      <input class="otp-box" id="b-otp-2" type="tel" maxlength="1" inputmode="numeric">
      <input class="otp-box" id="b-otp-3" type="tel" maxlength="1" inputmode="numeric">
      <input class="otp-box" id="b-otp-4" type="tel" maxlength="1" inputmode="numeric">
      <input class="otp-box" id="b-otp-5" type="tel" maxlength="1" inputmode="numeric">
    </div>
    <div id="b-otp-err" class="err-text"></div>
    <button class="btn" id="b-verify-btn" style="max-width:320px" onclick="bVerifyOtp()" disabled>
      <i class="ti ti-shield-check" aria-hidden="true"></i> 验证
    </button>
    <div class="resend-row">
      <button class="resend-btn" id="b-resend-btn" disabled onclick="bResendOtp()">重新发送 (<span id="b-cd-sec">60</span>s)</button>
    </div>
    <button style="background:transparent;border:none;color:var(--t3);font-size:13px;margin-top:8px;cursor:pointer" onclick="bBackToPhone()">
      <i class="ti ti-arrow-left"></i> 更换号码
    </button>
  </div>
</div>

<!-- OTP Auth: Step 3 - New member name -->
<div id="v-newname" class="view">
  <div class="auth-wrap">
    <i class="ti ti-confetti ico" aria-hidden="true"></i>
    <h2>欢迎加入！</h2>
    <div class="sub">请输入您的姓名，完成注册</div>
    <input class="nn-input" id="b-nn-name" type="text" placeholder="您的姓名" autocomplete="name">
    <div id="b-nn-err" class="err-text"></div>
    <button class="btn" id="b-nn-btn" style="max-width:280px;margin-top:6px" onclick="bCompleteReg()">
      <i class="ti ti-check" aria-hidden="true"></i> 完成注册
    </button>
  </div>
</div>

<div id="v-main" class="view">
  <div class="ck-top"><span class="ck-mark">Chop<b>Kar</b></span></div>
  <div class="hero">
    <div class="hero-logo" id="hero-logo">CHOPKAR</div>
    <div class="hero-sub">Bottle Keep · 存酒</div>
  </div>

  <div class="sec-ttl"><i class="ti ti-bottle" aria-hidden="true"></i> 存酒清单</div>
  <div id="bottles-wrap"></div>

  <div id="vouchers-section" style="display:none">
    <div class="sec-ttl" style="margin-top:18px"><i class="ti ti-ticket" aria-hidden="true"></i> 我的券</div>
    <div id="vouchers-wrap"></div>
  </div>

  <div class="ck-footer">Powered by <b>ChopKar</b></div>
</div>

</div>
<div class="toast" id="toast"></div>

<script>
const API='';
const S={slug:null,merchant:null,memberId:null,bottles:[],otpPhone:'',token:null,regTicket:null};
let cdTimer=null;
const SESSION_DAYS=30;

// 所有 /api/ 请求自动附带会员 token (后端鉴权)
const _fetch=window.fetch.bind(window);
window.fetch=(url,opts)=>{
  if(typeof url==='string'&&url.startsWith('/api/')&&S.token){
    opts=opts||{};opts.headers=Object.assign({},opts.headers||{},{'x-member-token':S.token});
  }
  return _fetch(url,opts);
};

function $(id){return document.getElementById(id);}
function esc(s){return String(s==null?'':s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}
let _tt;function toast(msg,type){const el=$('toast');el.textContent=msg;el.className='toast on'+(type?' '+type:'');clearTimeout(_tt);_tt=setTimeout(()=>el.className='toast',3000);}
function show(id){document.querySelectorAll('.view').forEach(v=>v.classList.remove('on'));$('v-'+id).classList.add('on');}

// ── Session management (30-day expiry, shared with card.html) ──
function saveSession(member,token){
  const session={memberId:member.id,phone:member.phone,name:member.name,token:token||S.token,expiresAt:Date.now()+SESSION_DAYS*86400000};
  try{
    localStorage.setItem('chopkar_'+S.slug+'_session',JSON.stringify(session));
    localStorage.setItem('chopkar_'+S.slug+'_memberId',member.id);
    localStorage.setItem('chopkar_'+S.slug+'_member',JSON.stringify(member));
  }catch(e){}
}
function getSession(){
  try{
    const raw=localStorage.getItem('chopkar_'+S.slug+'_session');
    if(!raw)return null;
    const s=JSON.parse(raw);
    if(!s.token||Date.now()>=s.expiresAt){clearSession();return null;}  // 旧格式无 token → 重新 OTP
    return s;
  }catch(e){return null;}
}
function clearSession(){
  try{['_session','_memberId','_member'].forEach(k=>localStorage.removeItem('chopkar_'+S.slug+k));}catch(e){}
}

// ── Phone helpers ──
function bGetPhone(){
  const cc=$('b-cc').value;const raw=$('b-ph').value.trim();
  if(cc==='other')return raw;
  return cc+raw.replace(/\D/g,'').replace(/^0+/,'');
}

function applyTheme(m){
  const hex=(m.brand_color||'#993C1D').trim();
  const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  const lum=r*0.299+g*0.587+b*0.114;
  const root=document.documentElement.style;
  root.setProperty('--brand',hex);
  root.setProperty('--card-text',lum>150?'#1A1A1A':'#FFFFFF');
  const bg=(m.bg_color||'').trim();
  const bgValid=/^#[0-9a-fA-F]{6}$/.test(bg);
  const bgLum=bgValid?(parseInt(bg.slice(1,3),16)*0.299+parseInt(bg.slice(3,5),16)*0.587+parseInt(bg.slice(5,7),16)*0.114):lum;
  const lightPage=bgLum>150;
  const T=lightPage
    ?{bg:'#F7F5F3',s1:'#FFFFFF',s2:'#FAF8F6',s3:'#F0EDEA',b1:'#ECE8E4',b2:'#E0DBD6',b3:'#CFC9C2',t1:'#22201E',t2:'#6B6760',t3:'#9A958E'}
    :{bg:'#1B1917',s1:'#221F1D',s2:'#2A2624',s3:'#332E2B',b1:'#2A2624',b2:'#36302C',b3:'#463E38',t1:'#F1ECE6',t2:'#A39C94',t3:'#6E665E'};
  for(const k in T)root.setProperty('--'+k,T[k]);
  if(bgValid)root.setProperty('--bg',bg);
  const mt=$('meta-theme');if(mt)mt.content=bgValid?bg:T.bg;
  document.title=m.name+' · ChopKar';
  const hl=$('hero-logo');
  if(m.logo_url)hl.innerHTML='<img src="'+m.logo_url+'" alt="logo">';
  else hl.textContent=(m.logo_text||m.name||'CHOPKAR').toUpperCase();
}

async function init(){
  S.slug=new URLSearchParams(location.search).get('m');
  if(!S.slug){show('error');return;}
  try{
    const res=await fetch(API+'/api/merchant/'+S.slug);
    if(!res.ok){show('error');return;}
    S.merchant=await res.json();
  }catch(e){show('error');return;}
  applyTheme(S.merchant);
  // Check session (with 30-day expiry + token)
  const sess=getSession();
  if(sess&&sess.memberId&&sess.token){
    S.memberId=sess.memberId;S.token=sess.token;
    show('main');loadData();return;
  }
  show('auth');
  setupBOtpInputs();
}

// ── OTP Flow ──
async function bSendOtp(){
  const phone=bGetPhone();
  $('b-send-err').textContent='';
  if(!phone||phone.length<8){$('b-send-err').textContent='请输入有效手机号';return;}
  const btn=$('b-send-btn');btn.disabled=true;btn.innerHTML='<i class="ti ti-loader-2" style="animation:sp 1s linear infinite"></i> 发送中...';
  try{
    const res=await fetch(API+'/api/auth/send-otp',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({phone})});
    const data=await res.json();
    if(!res.ok){$('b-send-err').textContent=data.error||'发送失败';return;}
    S.otpPhone=phone;
    $('b-otp-phone').textContent=phone;
    bClearOtp();show('otp');$('b-otp-0').focus();bStartCountdown();
  }catch(e){$('b-send-err').textContent='网络错误';}
  finally{btn.disabled=false;btn.innerHTML='<i class="ti ti-message"></i> 获取验证码';}
}

async function bVerifyOtp(){
  const code=bGetOtpCode();
  $('b-otp-err').textContent='';
  if(code.length<6){$('b-otp-err').textContent='请输入完整 6 位验证码';return;}
  const btn=$('b-verify-btn');btn.disabled=true;btn.innerHTML='<i class="ti ti-loader-2" style="animation:sp 1s linear infinite"></i> 验证中...';
  try{
    const res=await fetch(API+'/api/auth/verify-otp',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({phone:S.otpPhone,token:code,merchantId:S.merchant.id})});
    const data=await res.json();
    if(!res.ok){$('b-otp-err').textContent=data.error||'验证失败';btn.disabled=false;btn.innerHTML='<i class="ti ti-shield-check"></i> 验证';return;}
    if(data.isNew){S.regTicket=data.regTicket;show('newname');$('b-nn-name').focus();return;}
    bLoginWithMember(data.member,data.token);
  }catch(e){$('b-otp-err').textContent='网络错误';btn.disabled=false;btn.innerHTML='<i class="ti ti-shield-check"></i> 验证';}
}

async function bCompleteReg(){
  const name=$('b-nn-name').value.trim();
  $('b-nn-err').textContent='';
  if(!name){$('b-nn-err').textContent='请输入姓名';return;}
  const btn=$('b-nn-btn');btn.disabled=true;btn.textContent='注册中...';
  try{
    const res=await fetch(API+'/api/member',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({name,phone:S.otpPhone,merchantId:S.merchant.id,regTicket:S.regTicket})});
    const data=await res.json();
    if(!res.ok){$('b-nn-err').textContent=data.error||'注册失败';return;}
    bLoginWithMember(data,data.token);toast('Welcome, '+name.split(' ')[0]+'!');
  }catch(e){$('b-nn-err').textContent='网络错误';}
  finally{btn.disabled=false;btn.innerHTML='<i class="ti ti-check"></i> 完成注册';}
}

function bLoginWithMember(member,token){
  S.memberId=member.id;
  S.token=token||S.token;
  saveSession(member,S.token);
  show('main');loadData();
}

function bBackToPhone(){show('auth');bClearCountdown();}
async function bResendOtp(){
  const btn=$('b-resend-btn');btn.disabled=true;$('b-otp-err').textContent='';
  try{
    const res=await fetch(API+'/api/auth/send-otp',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({phone:S.otpPhone})});
    const data=await res.json();
    if(!res.ok){$('b-otp-err').textContent=data.error||'发送失败';btn.disabled=false;return;}
    bClearOtp();$('b-otp-0').focus();bStartCountdown();toast('验证码已重新发送');
  }catch(e){$('b-otp-err').textContent='网络错误';btn.disabled=false;}
}

// OTP input auto-focus
function setupBOtpInputs(){
  for(let i=0;i<6;i++){
    const el=$('b-otp-'+i);if(!el)return;
    el.addEventListener('input',function(){this.value=this.value.replace(/\D/g,'').slice(0,1);if(this.value&&i<5)$('b-otp-'+(i+1)).focus();bUpdateVerify();});
    el.addEventListener('keydown',function(e){if(e.key==='Backspace'&&!this.value&&i>0)$('b-otp-'+(i-1)).focus();if(e.key==='Enter'&&bGetOtpCode().length===6)bVerifyOtp();});
    el.addEventListener('paste',function(e){e.preventDefault();const txt=(e.clipboardData||window.clipboardData).getData('text').replace(/\D/g,'').slice(0,6);for(let j=0;j<6;j++){$('b-otp-'+j).value=txt[j]||'';}if(txt.length>0)$('b-otp-'+Math.min(txt.length,5)).focus();bUpdateVerify();});
  }
}
function bGetOtpCode(){let c='';for(let i=0;i<6;i++){const el=$('b-otp-'+i);c+=el?el.value:'';}return c;}
function bClearOtp(){for(let i=0;i<6;i++){const el=$('b-otp-'+i);if(el)el.value='';}bUpdateVerify();}
function bUpdateVerify(){const btn=$('b-verify-btn');if(btn)btn.disabled=bGetOtpCode().length<6;}

// Countdown
function bStartCountdown(){bClearCountdown();let sec=60;const btn=$('b-resend-btn'),lbl=$('b-cd-sec');btn.disabled=true;lbl.textContent=sec;cdTimer=setInterval(()=>{sec--;lbl.textContent=sec;if(sec<=0){bClearCountdown();btn.disabled=false;btn.textContent='重新发送验证码';}},1000);}
function bClearCountdown(){if(cdTimer){clearInterval(cdTimer);cdTimer=null;}}

document.addEventListener('DOMContentLoaded',()=>{
  const ph=$('b-ph');
  if(ph)ph.addEventListener('keydown',e=>{if(e.key==='Enter')bSendOtp();});
  init();
});

async function loadData(){
  $('bottles-wrap').innerHTML='<div class="loader"><i class="ti ti-loader-2"></i></div>';
  const q='memberId='+encodeURIComponent(S.memberId)+'&merchantId='+encodeURIComponent(S.merchant.id);
  try{
    const br=await fetch(API+'/api/bottles?'+q);
    if(br.status===401){S.token=null;clearSession();show('auth');setupBOtpInputs();return;}  // token 失效 → 重新登录
    const bottles=await br.json().catch(()=>[]);
    const vouchers=S.merchant.feature_voucher?await fetch(API+'/api/vouchers?'+q).then(r=>r.json()).catch(()=>[]):[];
    S.bottles=Array.isArray(bottles)?bottles:[];
    renderBottles(S.bottles);
    if(S.merchant.feature_voucher){$('vouchers-section').style.display='block';renderVouchers(vouchers||[]);}
  }catch(e){toast('加载失败','err');}
}

function progColor(pct){return pct>50?'#D85A30':(pct>=20?'#EF9F27':'#E24B4A');}
function daysLeft(iso){if(!iso)return null;return Math.ceil((new Date(iso)-new Date())/86400000);}

function renderBottles(list){
  const wrap=$('bottles-wrap');
  if(!list.length){wrap.innerHTML='<div class="empty"><i class="ti ti-bottle-off" aria-hidden="true"></i>您暂无存酒<br>请联系吧台登记</div>';return;}
  wrap.innerHTML=list.map(b=>{
    const pct=Math.max(0,Math.min(100,Math.round(b.remaining_ml/b.size_ml*100)));
    const col=progColor(pct);
    const d=daysLeft(b.expires_at);
    let exp='';
    if(d!==null){
      if(d<0)exp='<div class="b-exp warn">已过期</div>';
      else if(d<=7)exp='<div class="b-exp warn">⚠ '+d+' 天后到期</div>';
      else exp='<div class="b-exp">'+d+' 天后到期</div>';
    }
    const photo=b.photo_url?'<img class="b-photo" src="'+esc(b.photo_url)+'" alt="">':'';
    return '<div class="bottle">'
      +'<div class="b-top"><div><div class="b-brand">'+esc(b.brand)+'</div>'+exp+'</div>'+photo+'</div>'
      +'<div class="prog"><div class="prog-fill" style="width:'+pct+'%;background:'+col+'"></div></div>'
      +'<div class="b-amt"><span>剩余 <b>'+b.remaining_ml+'ml</b></span><span>总 '+b.size_ml+'ml · '+pct+'%</span></div>'
      +'<div class="b-foot"><button class="tx-btn" onclick="toggleTx(\''+b.id+'\',this)"><i class="ti ti-history"></i> 流水</button></div>'
      +'<div class="tx-list" id="tx-'+b.id+'"></div>'
      +'</div>';
  }).join('');
}

async function toggleTx(id,btn){
  const box=$('tx-'+id);
  if(box.classList.contains('on')){box.classList.remove('on');return;}
  box.classList.add('on');box.innerHTML='<div class="tx-item"><span>加载中...</span></div>';
  const tx=await fetch(API+'/api/bottles/'+id+'/transactions').then(r=>r.json()).catch(()=>[]);
  const pours=(tx||[]).filter(t=>t.type==='pour'||t.type==='deposit').slice(0,5);
  if(!pours.length){box.innerHTML='<div class="tx-item"><span>暂无记录</span></div>';return;}
  box.innerHTML=pours.map(t=>{
    const sign=t.type==='deposit'?'+':'-';
    const label=t.type==='deposit'?'存入':'倒酒';
    return '<div class="tx-item"><span>'+label+' '+sign+t.amount_ml+'ml</span><span>'+fmtT(t.created_at)+'</span></div>';
  }).join('');
}

function renderVouchers(list){
  const wrap=$('vouchers-wrap');
  if(!list.length){wrap.innerHTML='<div class="empty"><i class="ti ti-ticket-off" aria-hidden="true"></i>您暂无储值券</div>';return;}
  wrap.innerHTML=list.map(v=>{
    const unit=v.type==='session'?'次':'';
    const d=daysLeft(v.expires_at);
    const exp=d!==null?('<div class="v-meta">'+(d<0?'已过期':d+' 天后到期')+'</div>'):'';
    return '<div class="voucher"><div class="v-ico"><i class="ti ti-ticket"></i></div>'
      +'<div class="v-body"><div class="v-label">'+esc(v.label||(v.type==='session'?'次卡':'储值卡'))+'</div>'+exp+'</div>'
      +'<div class="v-rem"><div class="v-rem-val">'+(+v.remaining)+'</div><div class="v-rem-lbl">剩余'+unit+'</div></div></div>';
  }).join('');
}

function fmtT(s){const d=new Date(s);return d.toLocaleDateString('en-MY',{day:'numeric',month:'short'})+' '+d.toLocaleTimeString('en-MY',{hour:'2-digit',minute:'2-digit'});}
</script>
