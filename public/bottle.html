<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta id="meta-theme" name="theme-color" content="#1B1917">
<title>ChopKar</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{--brand:#D85A30;--card-text:#FFFFFF;--bg:#1B1917;--s1:#221F1D;--s2:#2A2624;--s3:#332E2B;--b1:#2A2624;--b2:#36302C;--b3:#463E38;--t1:#F1ECE6;--t2:#A39C94;--t3:#6E665E;--ck-accent:#D85A30;--ck-muted:#888780;--ok:#1D9E75;--warn:#EF9F27;--err:#E24B4A;--r:14px;--rs:9px;}
html,body{min-height:100%;background:var(--bg);color:var(--t1);font-family:system-ui,-apple-system,'DM Sans',sans-serif;font-size:15px}
button{font-family:inherit;cursor:pointer}
.app{min-height:100vh;min-height:100dvh;max-width:460px;margin:0 auto;display:flex;flex-direction:column;padding:0 18px 32px}
.view{display:none;flex-direction:column;flex:1}
.view.on{display:flex}
.ck-top{display:flex;justify-content:flex-end;padding:14px 0 0}
.ck-mark{font-family:'Bebas Neue',sans-serif;font-size:14px;letter-spacing:2px;color:var(--t2);opacity:.9}
.ck-mark b{color:var(--ck-accent);font-weight:400}
.hero{text-align:center;padding:18px 0 22px}
.hero-logo{font-family:'Bebas Neue',sans-serif;font-size:40px;letter-spacing:3px;color:var(--brand);line-height:1}
.hero-logo img{max-height:52px;max-width:78%;object-fit:contain}
.hero-sub{font-size:12px;color:var(--t3);letter-spacing:2px;text-transform:uppercase;margin-top:6px}
.sec-ttl{font-size:12px;letter-spacing:1.5px;text-transform:uppercase;color:var(--t3);margin:8px 2px 12px;display:flex;align-items:center;gap:8px}
.sec-ttl i{color:var(--brand)}
.bottle{background:var(--s1);border:1px solid var(--b2);border-radius:var(--r);padding:16px;margin-bottom:12px}
.b-top{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;margin-bottom:12px}
.b-brand{font-size:18px;font-weight:500}
.b-photo{width:44px;height:44px;border-radius:10px;object-fit:cover;background:var(--s3);flex-shrink:0}
.b-exp{font-size:11px;font-family:'DM Mono',monospace;color:var(--t3);margin-top:3px}
.b-exp.warn{color:var(--err)}
.prog{background:var(--s3);border-radius:20px;height:9px;overflow:hidden;margin:4px 0 6px}
.prog-fill{height:9px;border-radius:20px;transition:width .5s ease}
.b-amt{display:flex;justify-content:space-between;font-size:12px;font-family:'DM Mono',monospace;color:var(--t2)}
.b-amt b{color:var(--t1);font-weight:500}
.b-foot{display:flex;justify-content:flex-end;margin-top:8px}
.tx-btn{background:transparent;border:1px solid var(--b3);border-radius:20px;color:var(--t2);font-size:11px;padding:4px 12px}
.tx-list{margin-top:10px;border-top:1px solid var(--b1);padding-top:8px;display:none}
.tx-list.on{display:block}
.tx-item{display:flex;justify-content:space-between;font-size:11px;font-family:'DM Mono',monospace;color:var(--t3);padding:4px 0}
.voucher{background:var(--s1);border:1px solid var(--b2);border-radius:var(--r);padding:14px;margin-bottom:10px;display:flex;align-items:center;gap:12px}
.v-ico{width:40px;height:40px;border-radius:10px;background:rgba(216,90,48,0.12);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.v-ico i{color:var(--brand);font-size:18px}
.v-body{flex:1;min-width:0}
.v-label{font-size:14px;font-weight:500}
.v-meta{font-size:11px;color:var(--t3);font-family:'DM Mono',monospace;margin-top:2px}
.v-rem{text-align:right}
.v-rem-val{font-family:'Bebas Neue',sans-serif;font-size:24px;color:var(--brand);line-height:1}
.v-rem-lbl{font-size:10px;color:var(--t3)}
.empty{text-align:center;color:var(--t3);padding:32px 16px;font-size:13px;line-height:1.7}
.empty i{font-size:40px;display:block;margin-bottom:10px;color:var(--b3)}
.btn{display:flex;align-items:center;justify-content:center;gap:7px;width:100%;padding:14px;border-radius:var(--rs);border:none;background:var(--brand);color:var(--card-text);font-size:15px;font-weight:500;transition:filter .15s}
.btn:active{filter:brightness(.92)}
.ck-footer{margin-top:auto;padding-top:24px;text-align:center;font-size:12px;color:var(--ck-muted);letter-spacing:.5px}
.ck-footer b{color:var(--ck-accent);font-weight:500}
.loader{display:flex;align-items:center;justify-content:center;padding:60px;color:var(--t3)}
.loader i{animation:sp 1s linear infinite;font-size:28px}
@keyframes sp{to{transform:rotate(360deg)}}
.toast{position:fixed;top:18px;right:18px;background:var(--s2);border:1px solid var(--b3);border-radius:10px;padding:10px 16px;font-size:13px;color:var(--t1);z-index:200;opacity:0;transform:translateY(-10px);transition:all .25s;pointer-events:none;max-width:80%}
.toast.on{opacity:1;transform:translateY(0)}
.toast.ok{border-color:var(--ok);color:var(--ok)}
.toast.err{border-color:var(--err);color:var(--err)}
</style>
</head>
<body>
<div class="app">

<div id="v-loading" class="view on"><div class="loader"><i class="ti ti-loader-2" aria-hidden="true"></i></div></div>

<div id="v-error" class="view" style="align-items:center;justify-content:center;text-align:center;flex:1">
  <i class="ti ti-alert-circle" style="font-size:46px;color:var(--t3);margin-bottom:14px"></i>
  <div style="font-size:16px;font-weight:500">商家未找到</div>
  <div style="font-size:13px;color:var(--t2);margin-top:6px">请检查链接</div>
</div>

<div id="v-noauth" class="view" style="align-items:center;justify-content:center;text-align:center;flex:1;gap:14px">
  <i class="ti ti-user-question" style="font-size:46px;color:var(--t3)"></i>
  <div style="font-size:16px;font-weight:500">请先注册会员</div>
  <div style="font-size:13px;color:var(--t2);max-width:260px;line-height:1.6">先在会员卡页面登记手机号,即可查看您的存酒</div>
  <button class="btn" style="max-width:240px" onclick="goCard()"><i class="ti ti-arrow-right" aria-hidden="true"></i> 去会员卡注册</button>
</div>

<div id="v-main" class="view">
  <div class="ck-top"><span class="ck-mark">Chop<b>Kar</b></span></div>
  <div class="hero">
    <div class="hero-logo" id="hero-logo">CHOPKAR</div>
    <div class="hero-sub">Bottle Keep · 存酒</div>
  </div>

  <div class="sec-ttl"><i class="ti ti-bottle" aria-hidden="true"></i> 存酒清单</div>
  <div id="bottles-wrap"></div>

  <div id="vouchers-section" style="display:none">
    <div class="sec-ttl" style="margin-top:18px"><i class="ti ti-ticket" aria-hidden="true"></i> 我的券</div>
    <div id="vouchers-wrap"></div>
  </div>

  <div class="ck-footer">Powered by <b>ChopKar</b></div>
</div>

</div>
<div class="toast" id="toast"></div>

<script>
const API='';
const S={slug:null,merchant:null,memberId:null,bottles:[]};

function $(id){return document.getElementById(id);}
function esc(s){return String(s==null?'':s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}
let _tt;function toast(msg,type){const el=$('toast');el.textContent=msg;el.className='toast on'+(type?' '+type:'');clearTimeout(_tt);_tt=setTimeout(()=>el.className='toast',3000);}
function show(id){document.querySelectorAll('.view').forEach(v=>v.classList.remove('on'));$('v-'+id).classList.add('on');}
function goCard(){location.href='/card?m='+encodeURIComponent(S.slug);}

function applyTheme(m){
  const hex=(m.brand_color||'#993C1D').trim();
  const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  const lum=r*0.299+g*0.587+b*0.114;
  const root=document.documentElement.style;
  root.setProperty('--brand',hex);
  root.setProperty('--card-text',lum>150?'#1A1A1A':'#FFFFFF');
  const bg=(m.bg_color||'').trim();
  const bgValid=/^#[0-9a-fA-F]{6}$/.test(bg);
  const bgLum=bgValid?(parseInt(bg.slice(1,3),16)*0.299+parseInt(bg.slice(3,5),16)*0.587+parseInt(bg.slice(5,7),16)*0.114):lum;
  const lightPage=bgLum>150;
  const T=lightPage
    ?{bg:'#F7F5F3',s1:'#FFFFFF',s2:'#FAF8F6',s3:'#F0EDEA',b1:'#ECE8E4',b2:'#E0DBD6',b3:'#CFC9C2',t1:'#22201E',t2:'#6B6760',t3:'#9A958E'}
    :{bg:'#1B1917',s1:'#221F1D',s2:'#2A2624',s3:'#332E2B',b1:'#2A2624',b2:'#36302C',b3:'#463E38',t1:'#F1ECE6',t2:'#A39C94',t3:'#6E665E'};
  for(const k in T)root.setProperty('--'+k,T[k]);
  if(bgValid)root.setProperty('--bg',bg);
  const mt=$('meta-theme');if(mt)mt.content=bgValid?bg:T.bg;
  document.title=m.name+' · ChopKar';
  const hl=$('hero-logo');
  if(m.logo_url)hl.innerHTML='<img src="'+m.logo_url+'" alt="logo">';
  else hl.textContent=(m.logo_text||m.name||'CHOPKAR').toUpperCase();
}

async function init(){
  S.slug=new URLSearchParams(location.search).get('m');
  if(!S.slug){show('error');return;}
  try{
    const res=await fetch(API+'/api/merchant/'+S.slug);
    if(!res.ok){show('error');return;}
    S.merchant=await res.json();
  }catch(e){show('error');return;}
  applyTheme(S.merchant);
  S.memberId=localStorage.getItem('chopkar_'+S.slug+'_memberId');
  if(!S.memberId){show('noauth');return;}
  show('main');
  loadData();
}

async function loadData(){
  $('bottles-wrap').innerHTML='<div class="loader"><i class="ti ti-loader-2"></i></div>';
  const q='memberId='+encodeURIComponent(S.memberId)+'&merchantId='+encodeURIComponent(S.merchant.id);
  try{
    const [bottles,vouchers]=await Promise.all([
      fetch(API+'/api/bottles?'+q).then(r=>r.json()).catch(()=>[]),
      S.merchant.feature_voucher?fetch(API+'/api/vouchers?'+q).then(r=>r.json()).catch(()=>[]):Promise.resolve([]),
    ]);
    S.bottles=bottles||[];
    renderBottles(S.bottles);
    if(S.merchant.feature_voucher){$('vouchers-section').style.display='block';renderVouchers(vouchers||[]);}
  }catch(e){toast('加载失败','err');}
}

function progColor(pct){return pct>50?'#D85A30':(pct>=20?'#EF9F27':'#E24B4A');}
function daysLeft(iso){if(!iso)return null;return Math.ceil((new Date(iso)-new Date())/86400000);}

function renderBottles(list){
  const wrap=$('bottles-wrap');
  if(!list.length){wrap.innerHTML='<div class="empty"><i class="ti ti-bottle-off" aria-hidden="true"></i>您暂无存酒<br>请联系吧台登记</div>';return;}
  wrap.innerHTML=list.map(b=>{
    const pct=Math.max(0,Math.min(100,Math.round(b.remaining_ml/b.size_ml*100)));
    const col=progColor(pct);
    const d=daysLeft(b.expires_at);
    let exp='';
    if(d!==null){
      if(d<0)exp='<div class="b-exp warn">已过期</div>';
      else if(d<=7)exp='<div class="b-exp warn">⚠ '+d+' 天后到期</div>';
      else exp='<div class="b-exp">'+d+' 天后到期</div>';
    }
    const photo=b.photo_url?'<img class="b-photo" src="'+esc(b.photo_url)+'" alt="">':'';
    return '<div class="bottle">'
      +'<div class="b-top"><div><div class="b-brand">'+esc(b.brand)+'</div>'+exp+'</div>'+photo+'</div>'
      +'<div class="prog"><div class="prog-fill" style="width:'+pct+'%;background:'+col+'"></div></div>'
      +'<div class="b-amt"><span>剩余 <b>'+b.remaining_ml+'ml</b></span><span>总 '+b.size_ml+'ml · '+pct+'%</span></div>'
      +'<div class="b-foot"><button class="tx-btn" onclick="toggleTx(\''+b.id+'\',this)"><i class="ti ti-history"></i> 流水</button></div>'
      +'<div class="tx-list" id="tx-'+b.id+'"></div>'
      +'</div>';
  }).join('');
}

async function toggleTx(id,btn){
  const box=$('tx-'+id);
  if(box.classList.contains('on')){box.classList.remove('on');return;}
  box.classList.add('on');box.innerHTML='<div class="tx-item"><span>加载中...</span></div>';
  const tx=await fetch(API+'/api/bottles/'+id+'/transactions').then(r=>r.json()).catch(()=>[]);
  const pours=(tx||[]).filter(t=>t.type==='pour'||t.type==='deposit').slice(0,5);
  if(!pours.length){box.innerHTML='<div class="tx-item"><span>暂无记录</span></div>';return;}
  box.innerHTML=pours.map(t=>{
    const sign=t.type==='deposit'?'+':'-';
    const label=t.type==='deposit'?'存入':'倒酒';
    return '<div class="tx-item"><span>'+label+' '+sign+t.amount_ml+'ml</span><span>'+fmtT(t.created_at)+'</span></div>';
  }).join('');
}

function renderVouchers(list){
  const wrap=$('vouchers-wrap');
  if(!list.length){wrap.innerHTML='<div class="empty"><i class="ti ti-ticket-off" aria-hidden="true"></i>您暂无储值券</div>';return;}
  wrap.innerHTML=list.map(v=>{
    const unit=v.type==='session'?'次':'';
    const d=daysLeft(v.expires_at);
    const exp=d!==null?('<div class="v-meta">'+(d<0?'已过期':d+' 天后到期')+'</div>'):'';
    return '<div class="voucher"><div class="v-ico"><i class="ti ti-ticket"></i></div>'
      +'<div class="v-body"><div class="v-label">'+esc(v.label||(v.type==='session'?'次卡':'储值卡'))+'</div>'+exp+'</div>'
      +'<div class="v-rem"><div class="v-rem-val">'+(+v.remaining)+'</div><div class="v-rem-lbl">剩余'+unit+'</div></div></div>';
  }).join('');
}

function fmtT(s){const d=new Date(s);return d.toLocaleDateString('en-MY',{day:'numeric',month:'short'})+' '+d.toLocaleTimeString('en-MY',{hour:'2-digit',minute:'2-digit'});}

init();
</script>
</body>
</html>
