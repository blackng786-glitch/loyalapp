name: Supabase Keep-Alive

# Supabase free-tier projects pause after 7 days of inactivity.
# This workflow pings the database every 3 days to prevent that.

on:
  schedule:
    - cron: '0 6 */3 * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase to keep it awake
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          echo "Pinging Supabase to keep project active..."
          HTTP_CODE=$(curl -s -o /tmp/resp.txt -w "%{http_code}" \
            "${SUPABASE_URL}/rest/v1/merchants?select=count&limit=1" \
            -H "apikey: ${ANON_KEY}" \
            -H "Authorization: Bearer ${ANON_KEY}")
          echo "HTTP status: $HTTP_CODE"
          cat /tmp/resp.txt
          echo ""
          if [ "$HTTP_CODE" -ge 200 ] && [ "$HTTP_CODE" -lt 400 ]; then
            echo "✅ Supabase is alive."
          else
            echo "❌ Supabase ping failed (HTTP $HTTP_CODE)"
            exit 1
          fi
